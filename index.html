<!-- index.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrowthPartner｜売上収益の健康診断</title>
  <style>
    /* ───── Reset & Base ───── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
      background:#000; color:#fff; overflow-x:hidden; line-height:1.6;
    }
    a { color:inherit; text-decoration:none; }
    button { cursor:pointer; border:none; font-family:inherit; }

    /* ───── NAV ───── */
    .nav {
      position:fixed; top:0; width:100%; z-index:50;
      transition:background .3s, box-shadow .3s;
    }
    .nav.scrolled { background:rgba(0,0,0,.9); backdrop-filter:blur(12px); box-shadow:0 1px 20px rgba(0,0,0,.5); }
    .nav-inner {
      max-width:1200px; margin:auto; padding:0 24px;
      height:64px; display:flex; align-items:center; justify-content:space-between;
    }
    .logo { font-size:20px; font-weight:700; letter-spacing:-.5px; }
    .logo span { color:#60a5fa; }
    .nav-links { display:flex; align-items:center; gap:32px; }
    .nav-links a { font-size:14px; color:#9ca3af; transition:color .2s; }
    .nav-links a:hover { color:#fff; }
    .nav-cta {
      padding:8px 20px; background:#2563eb; border-radius:999px;
      font-size:14px; font-weight:600; color:#fff;
      transition:all .2s;
    }
    .nav-cta:hover { background:#3b82f6; box-shadow:0 4px 20px rgba(59,130,246,.3); }
    .hamburger { display:none; background:none; color:#fff; }
    .hamburger svg { width:24px; height:24px; }
    .mobile-menu {
      display:none; background:rgba(0,0,0,.95); backdrop-filter:blur(12px);
      border-top:1px solid rgba(255,255,255,.1); padding:16px 24px;
    }
    .mobile-menu.open { display:block; }
    .mobile-menu a { display:block; padding:12px 0; color:#9ca3af; }
    .mobile-menu a:hover { color:#fff; }
    .mobile-menu button {
      width:100%; margin-top:8px; padding:12px; background:#2563eb;
      border-radius:999px; font-size:14px; font-weight:600; color:#fff;
    }

    @media(max-width:768px){
      .nav-links { display:none; }
      .hamburger { display:block; }
    }

    /* ───── HERO ───── */
    .hero {
      position:relative; min-height:100vh; display:flex; align-items:center;
      justify-content:center; padding:80px 24px 40px; text-align:center;
    }
    .hero-bg1, .hero-bg2 {
      position:absolute; width:400px; height:400px; border-radius:50%;
      filter:blur(100px); pointer-events:none;
    }
    .hero-bg1 { top:20%; left:15%; background:rgba(59,130,246,.1); }
    .hero-bg2 { bottom:20%; right:15%; background:rgba(168,85,247,.1); }
    .hero-content { position:relative; z-index:1; max-width:800px; margin:auto; }
    .badge {
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 16px; background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1); border-radius:999px;
      font-size:14px; color:#9ca3af; margin-bottom:32px;
    }
    .badge-dot {
      width:8px; height:8px; background:#4ade80; border-radius:50%;
      animation:pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100%{ opacity:1; } 50%{ opacity:.4; }
    }
    .hero h1 {
      font-size:clamp(32px,6vw,64px); font-weight:700;
      line-height:1.2; letter-spacing:-.02em; margin-bottom:24px;
    }
    .grad-text {
      background:linear-gradient(90deg,#60a5fa,#c084fc);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .hero p.sub {
      font-size:clamp(16px,2.5vw,20px); color:#9ca3af;
      max-width:600px; margin:0 auto 48px;
    }

    /* メインCTA */
    .main-cta {
      display:inline-flex; align-items:center; gap:12px;
      padding:20px 40px; background:linear-gradient(135deg,#2563eb,#9333ea);
      border-radius:16px; font-size:18px; font-weight:700; color:#fff;
      transition:all .3s; position:relative; overflow:hidden;
    }
    .main-cta:hover { transform:scale(1.05); box-shadow:0 8px 40px rgba(59,130,246,.3); }
    .main-cta .cta-sub { display:block; font-size:13px; font-weight:400; color:#bfdbfe; margin-top:2px; }
    .main-cta .arrow { transition:transform .2s; }
    .main-cta:hover .arrow { transform:translateX(4px); }
    .note { margin-top:16px; font-size:12px; color:#6b7280; }

    /* ───── 診断UI ───── */
    .diag-wrap { max-width:640px; margin:auto; }
    .prog-bar-wrap { margin-bottom:32px; }
    .prog-labels { display:flex; justify-content:space-between; font-size:14px; color:#9ca3af; margin-bottom:8px; }
    .prog-track { width:100%; height:8px; background:rgba(255,255,255,.1); border-radius:999px; overflow:hidden; }
    .prog-fill {
      height:100%; background:linear-gradient(90deg,#3b82f6,#a855f7);
      border-radius:999px; transition:width .5s;
    }
    .q-text { font-size:clamp(20px,3vw,28px); font-weight:700; margin-bottom:32px; line-height:1.4; }
    .opt-list { display:flex; flex-direction:column; gap:12px; }
    .opt-btn {
      width:100%; text-align:left; padding:16px 24px;
      background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
      border-radius:12px; color:#d1d5db; font-size:16px;
      transition:all .2s;
    }
    .opt-btn:hover { background:rgba(255,255,255,.1); border-color:rgba(59,130,246,.5); color:#fff; }
    .opt-badge {
      display:inline-flex; align-items:center; justify-content:center;
      width:28px; height:28px; background:rgba(255,255,255,.1);
      border-radius:50%; font-size:13px; margin-right:12px;
    }

    /* ───── 結果 ───── */
    .result-card {
      background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
      border-radius:24px; padding:48px 32px; backdrop-filter:blur(8px);
      max-width:640px; margin:auto;
    }
    .result-label { font-size:14px; color:#9ca3af; margin-bottom:16px; }
    .score-ring { position:relative; width:160px; height:160px; margin:0 auto 24px; }
    .score-ring svg { width:100%; height:100%; transform:rotate(-90deg); }
    .score-ring .bg { fill:none; stroke:rgba(255,255,255,.05); stroke-width:8; }
    .score-ring .fg { fill:none; stroke-width:8; stroke-linecap:round; transition:stroke-dasharray 1s; }
    .score-val {
      position:absolute; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
    }
    .score-num { font-size:36px; font-weight:700; }
    .score-of { font-size:14px; color:#9ca3af; }
    .grade-badge {
      display:inline-block; padding:4px 16px; border-radius:999px;
      font-size:14px; font-weight:700; margin-bottom:16px;
    }
    .result-msg { color:#d1d5db; margin-bottom:32px; line-height:1.7; }
    .result-actions { display:flex; flex-direction:column; gap:12px; }
    .btn-primary {
      width:100%; padding:16px; background:linear-gradient(135deg,#2563eb,#9333ea);
      border-radius:12px; font-size:18px; font-weight:700; color:#fff;
      transition:all .2s;
    }
    .btn-primary:hover { box-shadow:0 4px 24px rgba(59,130,246,.3); }
    .btn-ghost {
      width:100%; padding:14px; background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1); border-radius:12px;
      font-size:14px; color:#9ca3af; transition:all .2s;
    }
    .btn-ghost:hover { background:rgba(255,255,255,.1); color:#fff; }

    /* ───── Section Common ───── */
    section { padding:100px 24px; }
    .section-title {
      text-align:center; font-size:clamp(24px,4vw,40px); font-weight:700;
      margin-bottom:16px;
    }
    .section-sub { text-align:center; color:#9ca3af; max-width:600px; margin:0 auto 48px; font-size:16px; }

    /* ───── ZOOM無料診断セクション（2ページ目） ───── */
    .zoom-section {
      background:linear-gradient(180deg,rgba(37,99,235,.08),transparent);
      border-top:1px solid rgba(255,255,255,.05);
    }
    .zoom-card {
      max-width:720px; margin:auto;
      background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
      border-radius:24px; padding:48px 32px; text-align:center;
    }
    .zoom-card h3 { font-size:28px; font-weight:700; margin-bottom:8px; }
    .zoom-card .zoom-sub { color:#9ca3af; margin-bottom:32px; }
    .zoom-features { display:flex; flex-wrap:wrap; gap:16px; justify-content:center; margin-bottom:32px; }
    .zoom-feat {
      display:flex; align-items:center; gap:8px;
      padding:8px 16px; background:rgba(255,255,255,.05);
      border-radius:999px; font-size:14px; color:#d1d5db;
    }
    .zoom-feat .check { color:#4ade80; }
    .zoom-book-btn {
      display:inline-flex; align-items:center; gap:8px;
      padding:16px 40px; background:#2563eb; border-radius:12px;
      font-size:18px; font-weight:700; color:#fff; transition:all .2s;
    }
    .zoom-book-btn:hover { background:#3b82f6; box-shadow:0 4px 24px rgba(59,130,246,.3); transform:translateY(-2px); }

    /* ───── SERVICES ───── */
    .services-grid {
      max-width:1000px; margin:auto;
      display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:24px;
    }
    .service-card {
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08);
      border-radius:16px; padding:32px; transition:all .3s;
    }
    .service-card:hover { background:rgba(255,255,255,.06); border-color:rgba(59,130,246,.3); transform:translateY(-4px); }
    .service-icon { font-size:32px; margin-bottom:16px; }
    .service-card h3 { font-size:20px; font-weight:700; margin-bottom:8px; }
    .service-card p { font-size:14px; color:#9ca3af; line-height:1.7; }

    /* ───── RESULTS ───── */
    .results-grid {
      max-width:900px; margin:auto;
      display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:24px;
    }
    .result-stat {
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08);
      border-radius:16px; padding:32px; text-align:center;
    }
    .result-stat .num {
      font-size:48px; font-weight:700;
      background:linear-gradient(135deg,#60a5fa,#c084fc);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .result-stat .label { font-size:14px; color:#9ca3af; margin-top:8px; }

    /* ───── PROCESS ───── */
    .process-list { max-width:640px; margin:auto; display:flex; flex-direction:column; gap:32px; }
    .process-item { display:flex; gap:20px; }
    .step-num {
      flex-shrink:0; width:48px; height:48px; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#2563eb,#9333ea); border-radius:50%;
      font-size:18px
