window.storage = {
  async get(key, shared) {
    const val = localStorage.getItem("aisdr_" + key);
    if (val === null) throw new Error("not found");
    return { key, value: val, shared: !!shared };
  },
  async set(key, value, shared) {
    localStorage.setItem("aisdr_" + key, typeof value === "string" ? value : JSON.stringify(value));
    return { key, value, shared: !!shared };
  },
  async delete(key, shared) {
    localStorage.removeItem("aisdr_" + key);
    return { key, deleted: true, shared: !!shared };
  },
  async list(prefix, shared) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith("aisdr_" + (prefix || ""))) keys.push(k.replace("aisdr_", ""));
    }
    return { keys, prefix, shared: !!shared };
  }
};

【王国タイプ分類】ヒアリング内容から、以下の8タイプのうち最も近いものを1つ選んでください：
- 停滞王国: 忙しいが前に進まない。改善の余地はあるが構造が整理されていない
- 消耗王国: 業務は回っているが人的疲労が蓄積
- 属人化王国: 特定の人がいないと回らない
- 機会損失王国: 返信遅れ・取りこぼし・追客不足で売上を逃している
- 混線王国: 窓口や業務フローが混乱
- 拡張準備王国: 現状は回っているが、次の成長に仕組み化が必要
- 手作業過密王国: 単純作業が集中し、機械に任せる余地が大きい
- 反応遅延王国: 受付・返信・確認が遅れ、機会損失や不満が発生

- コスト削減は業務内容に応じて15-45%の範囲
- monthly_feeは50000〜200000で、効果に見合う額を設定

const fmt = (n) => {
  const num = typeof n === "string" ? parseInt(n.replace(/[^0-9]/g, ""), 10) : n;
  return isNaN(num) || num === 0 ? "—" : "¥" + num.toLocaleString("ja-JP");
};
const fmtN = (n) => {
  const num = typeof n === "number" ? n : parseInt(String(n).replace(/[^0-9]/g, ""), 10);
  return isNaN(num) || num === 0 ? "—" : num.toLocaleString("ja-JP");
};
const today = () => { const d = new Date(); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; };
const costNum = (v) => typeof v === "number" ? v : parseInt(String(v).replace(/[^0-9]/g,""),10) || 0;

const parseProposal = (text) => {
  const s = text.indexOf("===PROPOSAL_DATA===");
  const e = text.indexOf("===END_PROPOSAL===");
  if (s===-1) { console.log("No PROPOSAL_DATA marker found"); return null; }
  // END marker might be missing if truncated — try to parse anyway
  const jsonEnd = e !== -1 ? e : text.length;
  let raw = text.substring(s+19, jsonEnd).trim();
  // Clean common issues
  raw = raw.replace(/,\s*}/g,"}").replace(/,\s*]/g,"]"); // trailing commas
  try { 
    const parsed = JSON.parse(raw);
    console.log("JSON parsed successfully");
    return parsed;
  } catch(err) {
    console.error("JSON parse failed:", err.message, "raw length:", raw.length);
    console.log("First 200 chars:", raw.substring(0,200));
    console.log("Last 200 chars:", raw.substring(raw.length-200));
    // Try to fix truncated JSON by closing brackets
    let attempt = raw;
    const opens = (attempt.match(/{/g)||[]).length;
    const closes = (attempt.match(/}/g)||[]).length;
    const arrOpens = (attempt.match(/\[/g)||[]).length;
    const arrCloses = (attempt.match(/]/g)||[]).length;
    for(let i=0;i<arrOpens-arrCloses;i++) attempt+="]";
    for(let i=0;i<opens-closes;i++) attempt+="}";
    // Remove trailing comma before closing
    attempt = attempt.replace(/,\s*}/g,"}").replace(/,\s*]/g,"]");
    try {
      const fixed = JSON.parse(attempt);
      console.log("JSON fixed and parsed");
      return fixed;
    } catch { 
      console.error("JSON fix also failed");
      return null; 
    }
  }
};
const visibleText = (text) => {
  let t = text;
  const pi = t.indexOf("===PROPOSAL_DATA===");
  if (pi !== -1) t = t.substring(0, pi);
  const ci = t.indexOf("===CHOICES===");
  if (ci !== -1) t = t.substring(0, ci);
  return t.trim();
};

const parseChoices = (text) => {
  const s = text.indexOf("===CHOICES===");
  const e = text.indexOf("===END_CHOICES===");
  if (s === -1) return [];
  const end = e !== -1 ? e : text.length;
  const raw = text.substring(s + 13, end).trim();
  return raw.split("\n").map(l => l.trim()).filter(l => l.length > 0 && l.length < 50).slice(0, 3);
};

function AISDR() {
  const [view,setView]=useState("landing"); // Proxy版: 常にlandingから開始
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [busy,setBusy]=useState(false);
  const [composing,setComposing]=useState(false);
  const [proposal,setProposal]=useState(null);
  const [storyText,setStoryText]=useState("");
  const [proposalBody,setProposalBody]=useState("");
  const [genStep,setGenStep]=useState("");
  const [error,setError]=useState("");
  const [bookingName,setBookingName]=useState("");
  const [bookingEmail,setBookingEmail]=useState("");
  const [bookingDate,setBookingDate]=useState("");
  const [bookingSent,setBookingSent]=useState(false);
  const [choices,setChoices]=useState([]);
  const [proposalId,setProposalId]=useState(null);
  const [adminData,setAdminData]=useState([]);
  const [adminLoading,setAdminLoading]=useState(false);
  const endRef=useRef(null);
  const inputRef=useRef(null);

  const scroll=useCallback(()=>{setTimeout(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),80);},[]);

  const openChat=()=>{
    setView("chat"); setError("");
    if(msgs.length===0){
      setMsgs([{role:"assistant",content:"こんにちは！「AIの町医者」へようこそ。\n\n売上のこと、集客のこと、人手不足のこと……\n経営のお悩みなら何でもお気軽にどうぞ。\n\nまずは、どんな業種のお仕事をされていますか？"}]);
      setChoices(["飲食店です","建設・不動産業です","小売・サービス業です"]);
    }
    setTimeout(()=>inputRef.current?.focus(),300);
  };

  const callAPI=async(messages,system=null,maxTok=1500)=>{
    const body={model:"claude-sonnet-4-20250514",max_tokens:maxTok,messages};
    if(system) body.system=system;
    const r=await fetch(PROXY_URL,{
      method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body),
    });
    if(!r.ok) throw new Error(`API ${r.status}`);
    const d=await r.json();
    return d.content?.map(b=>b.text||"").join("")||"";
  };

  const send=async(overrideText)=>{
    const text=(overrideText||input).trim(); if(!text||busy) return;
    setError(""); setChoices([]);
    const next=[...msgs,{role:"user",content:text}];
    setMsgs(next); setInput(""); setBusy(true); scroll();

    try {
      // チャット応答＋JSON生成は4096トークン必要（JSON内にシナリオ等が含まれるため）
      const reply=await callAPI(next.map(m=>({role:m.role,content:m.content})),SYSTEM_PROMPT,4096);
      console.log("API reply length:",reply.length,"has markers:",reply.includes("===PROPOSAL_DATA==="));
      const data=parseProposal(reply);
      const shown=visibleText(reply);
      const newChoices=parseChoices(reply);
      setMsgs(prev=>[...prev,{role:"assistant",content:shown}]); 
      setChoices(newChoices);
      scroll();

      if(data){
        console.log("Proposal parsed OK:",data.company,data.kingdom_type);
        setProposal(data);
        setBookingName(data.name!=="ご担当者"?data.name:"");
        setView("proposal");
        setGenStep("generating");

        // 物語と提案書を並列生成（Promise.all）— 待ち時間が半分に
        const jsonStr=JSON.stringify(data,null,2);
        const [storyResult, proposalResult] = await Promise.allSettled([
          callAPI([{role:"user",content:STORY_PROMPT.replace("{DATA}",jsonStr)}]),
          callAPI([{role:"user",content:PROPOSAL_PROMPT.replace("{DATA}",jsonStr)}]),
        ]);

        setStoryText(storyResult.status==="fulfilled"?storyResult.value:"");
        setProposalBody(proposalResult.status==="fulfilled"?proposalResult.value:"提案書の生成中にエラーが発生しました。");
        setGenStep("done");
        // 永続ストレージに保存
        await saveProposal(data, storyResult.status==="fulfilled"?storyResult.value:"", proposalResult.status==="fulfilled"?proposalResult.value:"");
      } else if(shown.includes("まとめ") || shown.includes("お待ち") || shown.includes("試算") || shown.includes("レポート")) {
        // AIが「まとめますね」と言ったのにJSONが取れなかった → リトライ
        console.log("Farewell detected but no JSON. Retrying with explicit request...");
        setMsgs(prev=>[...prev,{role:"assistant",content:"（レポート生成の準備中です…もう少しお待ちください）"}]);
        try {
          const retryMsgs=[...next.map(m=>({role:m.role,content:m.content})),
            {role:"assistant",content:shown},
            {role:"user",content:"上記の会話内容をもとに、===PROPOSAL_DATA=== と ===END_PROPOSAL=== のマーカーで囲んだJSONデータを出力してください。会話文は不要です、JSONのみ出力してください。"}
          ];
          const retryReply=await callAPI(retryMsgs,SYSTEM_PROMPT,4096);
          console.log("Retry reply length:",retryReply.length);
          const retryData=parseProposal(retryReply);
          if(retryData){
            console.log("Retry succeeded!");
            setProposal(retryData);
            setBookingName(retryData.name!=="ご担当者"?retryData.name:"");
            setView("proposal");
            setGenStep("generating");
            const jsonStr=JSON.stringify(retryData,null,2);
            const [sr,pr]=await Promise.allSettled([
              callAPI([{role:"user",content:STORY_PROMPT.replace("{DATA}",jsonStr)}]),
              callAPI([{role:"user",content:PROPOSAL_PROMPT.replace("{DATA}",jsonStr)}]),
            ]);
            setStoryText(sr.status==="fulfilled"?sr.value:"");
            setProposalBody(pr.status==="fulfilled"?pr.value:"");
            setGenStep("done");
            await saveProposal(retryData, sr.status==="fulfilled"?sr.value:"", pr.status==="fulfilled"?pr.value:"");
          } else {
            setMsgs(prev=>prev.slice(0,-1)); // remove loading message
            setError("レポートの生成に失敗しました。もう少し情報を教えていただけますか？");
          }
        } catch(retryErr) {
          console.error("Retry failed:",retryErr);
          setError("レポート生成に失敗しました。もう一度お試しください。");
        }
      }
    } catch(e) {
      setError("通信エラーが発生しました。もう一度お試しください。");
      console.error(e);
    }
    setBusy(false);
  };

  const handleKey=(e)=>{ if(e.key==="Enter"&&!e.shiftKey&&!composing){e.preventDefault();send();} };
  const sendChoice=(text)=>{ setInput(""); send(text); };

  /* ── Storage: 診断結果を保存 ── */
  const saveProposal=async(data,story,body)=>{
    try{
      const id="diag_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
      const record={
        id,
        created_at:new Date().toISOString(),
        company:data.company||"不明",
        name:data.name||"不明",
        industry:data.industry||"不明",
        kingdom_type:data.kingdom_type||"不明",
        challenge:data.challenge||"",
        monthly_revenue:costNum(data.monthly_revenue),
        total_gain:costNum(data.total_revenue_gain_monthly)+costNum(data.total_cost_saving_monthly),
        revenue_gain:costNum(data.total_revenue_gain_monthly),
        cost_saving:costNum(data.total_cost_saving_monthly),
        monthly_fee:costNum(data.monthly_fee),
        roi_months:data.roi_months||0,
        solutions:data.solutions||[],
        current_scenario:data.current_scenario||{},
        future_scenario:data.future_scenario||{},
        story_text:story||"",
        proposal_body:body||"",
        full_data:data,
        status:"new", // new → contacted → converted
      };
      await window.storage.set("proposal:"+id,JSON.stringify(record),true);
      setProposalId(id);
      // Also update index
      let keys=[];
      try{ const list=await window.storage.list("proposal:",true); keys=list?.keys||[]; }catch{}
      console.log("Proposal saved:",id,"Total proposals:",keys.length);
      return id;
    }catch(e){console.error("Save failed:",e);return null;}
  };

  /* ── Storage: 管理画面用にロード ── */
  const loadAdmin=async()=>{
    setAdminLoading(true);
    try{
      const list=await window.storage.list("proposal:",true);
      const keys=list?.keys||[];
      const items=[];
      for(const key of keys.slice(-50)){// 最新50件
        try{
          const r=await window.storage.get(key,true);
          if(r?.value) items.push(JSON.parse(r.value));
        }catch{}
      }
      items.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
      setAdminData(items);
    }catch(e){console.error("Load failed:",e);setAdminData([]);}
    setAdminLoading(false);
  };

  /* ── Derived values ── */
  const p = proposal;
  const revGain = p ? costNum(p.total_revenue_gain_monthly) : 0;
  const costSave = p ? costNum(p.total_cost_saving_monthly) : 0;
  const totalGain = revGain + costSave;
  const fee = p ? costNum(p.monthly_fee) : 0;
  const netMonthly = totalGain - fee;
  const yearlyGain = totalGain * 12;
  const kingdom = p ? (KINGDOM[p.kingdom_type] || { emoji:"🏰", color:C.accent, label:p.kingdom_type }) : null;
  const solColors = [C.accent, C.warm, C.green, C.purple];

  /* ═══ PROPOSAL VIEW ═══ */
  if(view==="proposal"){
    if(genStep!=="done"){
      return <LoadingScreen/>;
    }

    return (
      <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Noto Sans JP',sans-serif"}} id="proposal-print">
        <div style={{maxWidth:820,margin:"0 auto",padding:"32px 20px 60px"}}>

          {/* Avatar Bar */}
          <div style={{marginBottom:20}}><AvatarBadge size={38}/></div>

          {/* Header */}
          <div style={{textAlign:"center",marginBottom:36,paddingBottom:24,borderBottom:`2px solid ${C.accent}33`}}>
            <div style={{display:"inline-block",padding:"5px 16px",borderRadius:20,background:C.accentGlow,color:C.accent,fontSize:12,fontWeight:600,letterSpacing:"0.08em",marginBottom:14,border:`1px solid ${C.accentDark}44`}}>AI DIAGNOSTIC REPORT</div>
            <h1 style={{fontSize:"clamp(24px,4vw,32px)",fontWeight:800,color:C.white,margin:"0 0 8px",letterSpacing:"-0.02em"}}>AI導入診断レポート</h1>
            <p style={{fontSize:14,color:C.dim,margin:0}}>{p?.company} {p?.name}様 ｜ {today()}</p>
          </div>

          {/* Kingdom Type */}
          {kingdom && (
            <div style={{padding:24,borderRadius:16,background:`${kingdom.color}10`,border:`1px solid ${kingdom.color}33`,marginBottom:24,textAlign:"center"}}>
              <div style={{fontSize:40,marginBottom:8}}>{kingdom.emoji}</div>
              <div style={{fontSize:20,fontWeight:800,color:kingdom.color,marginBottom:6}}>御社は「{kingdom.label}」タイプ</div>
              <div style={{fontSize:13,color:C.dim,lineHeight:1.7,maxWidth:500,margin:"0 auto"}}>{p?.kingdom_description}</div>
            </div>
          )}

          {/* KPI Cards — 売上向上 + コスト削減 の2軸 */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:10,marginBottom:28}}>
            {[
              {label:"月間売上向上見込み",value:fmt(revGain),color:C.green,icon:"📈"},
              {label:"月間コスト削減見込み",value:fmt(costSave),color:C.accent,icon:"💰"},
              {label:"月間改善効果合計",value:fmt(totalGain),color:C.warm,icon:"⚡"},
              {label:"月額コンサル料",value:fmt(fee),color:C.white,sub:`実質利益 ${fmt(netMonthly)}/月`,icon:"📋"},
              {label:"年間改善効果",value:fmt(yearlyGain),color:C.green,icon:"🎯"},
              {label:"投資回収期間",value:`${p?.roi_months||"—"}ヶ月`,color:C.accent,icon:"⏱️"},
            ].map((k,i)=>(
              <div key={i} style={{padding:"18px 14px",borderRadius:14,background:C.card,border:`1px solid ${C.border}`,textAlign:"center"}}>
                <div style={{fontSize:16,marginBottom:6}}>{k.icon}</div>
                <div style={{fontSize:"clamp(18px,3vw,24px)",fontWeight:800,color:k.color}}>{k.value}</div>
                <div style={{fontSize:10,color:C.muted,marginTop:3}}>{k.label}</div>
                {k.sub&&<div style={{fontSize:10,color:C.green,marginTop:3}}>{k.sub}</div>}
              </div>
            ))}
          </div>

          {/* ══ STORY: Current Scenario ══ */}
          {p?.current_scenario && (
            <div style={{marginBottom:28}}>
              <h2 style={{fontSize:16,fontWeight:700,color:C.red,marginBottom:14,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>
                ⚠ このままの未来（放置シナリオ）
              </h2>
              <div style={{padding:20,borderRadius:14,background:`${C.red}06`,border:`1px solid ${C.red}18`}}>
                <TimelineItem time="3ヶ月後" text={p.current_scenario["3months"]} color={C.warm} />
                <TimelineItem time="1年後" text={p.current_scenario["1year"]} color={C.red} />
                <TimelineItem time="3年後" text={p.current_scenario["3years"]} color="#8b2020" isLast />
              </div>
            </div>
          )}

          {/* ══ STORY: Future Scenario ══ */}
          {p?.future_scenario && (
            <div style={{marginBottom:28}}>
              <h2 style={{fontSize:16,fontWeight:700,color:C.green,marginBottom:14,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>
                ✨ AI導入後の未来
              </h2>
              <div style={{padding:20,borderRadius:14,background:`${C.green}06`,border:`1px solid ${C.green}18`}}>
                <TimelineItem time="導入直後" text={p.future_scenario.immediate} color={C.accent} />
                <TimelineItem time="3ヶ月後" text={p.future_scenario["3months"]} color={C.green} />
                <TimelineItem time="1年後" text={p.future_scenario["1year"]} color="#2d7a59" isLast />
              </div>
            </div>
          )}

          {/* Story body (generated) */}
          {storyText && (
            <div style={{padding:22,borderRadius:14,background:C.card,border:`1px solid ${C.border}`,marginBottom:28}}>
              <div style={{fontSize:14,lineHeight:2,color:C.text,whiteSpace:"pre-wrap"}}>{storyText}</div>
            </div>
          )}

          {/* Solutions */}
          <div style={{marginBottom:28}}>
            <h2 style={{fontSize:16,fontWeight:700,color:C.white,marginBottom:14,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>ソリューション提案</h2>
            {p?.solutions?.map((sol,i)=>(
              <div key={i} style={{padding:18,borderRadius:14,background:C.card,border:`1px solid ${C.border}`,marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                  <div style={{width:26,height:26,borderRadius:7,background:`${solColors[i%4]}18`,color:solColors[i%4],fontSize:13,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div>
                  <div style={{fontSize:14,fontWeight:700,color:C.white,flex:1}}>{sol.title}</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {sol.revenue_impact_yen>0&&<span style={{padding:"2px 8px",borderRadius:5,background:C.greenGlow,color:C.green,fontSize:11,fontWeight:600}}>売上+{fmt(sol.revenue_impact_yen)}/月</span>}
                    {sol.cost_saving_yen>0&&<span style={{padding:"2px 8px",borderRadius:5,background:C.accentGlow,color:C.accent,fontSize:11,fontWeight:600}}>削減{fmt(sol.cost_saving_yen)}/月</span>}
                  </div>
                </div>
                <div style={{fontSize:13,color:C.dim,lineHeight:1.7,marginBottom:10}}>{sol.description}</div>
                {sol.revenue_impact_pct>0&&<Bar label="売上向上効果" pct={sol.revenue_impact_pct} color={C.green} suffix="向上"/>}
                {sol.cost_saving_pct>0&&<Bar label="コスト削減効果" pct={sol.cost_saving_pct} color={C.accent} suffix="削減"/>}
              </div>
            ))}
          </div>

          {/* Proposal Body */}
          {proposalBody&&(
            <div style={{marginBottom:28}}>
              <h2 style={{fontSize:16,fontWeight:700,color:C.white,marginBottom:14,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>提案書</h2>
              <div style={{fontSize:14,lineHeight:2,color:C.text,whiteSpace:"pre-wrap",padding:22,borderRadius:14,background:C.card,border:`1px solid ${C.border}`}}>{proposalBody}</div>
            </div>
          )}

          {/* Steps */}
          <div style={{marginBottom:28}}>
            <h2 style={{fontSize:16,fontWeight:700,color:C.white,marginBottom:14,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>導入ステップ</h2>
            <Step num={1} title="無料詳細診断（60分）" desc="業務フローを実際に拝見し、最もAI効果が高いポイントを特定。オンラインでも訪問でも対応可能。" color={C.accent}/>
            <Step num={2} title="プロトタイプ構築（2-4週間）" desc="最も効果の高い施策から着手。動くものをお見せしながらフィードバックを反映。" color={C.warm}/>
            <Step num={3} title="本格運用・効果測定" desc="月次レポートで効果を可視化。売上向上とコスト削減の両面で継続改善。" color={C.green}/>
          </div>

          {/* ══ BOOKING CTA ══ */}
          <div style={{padding:24,borderRadius:16,background:`linear-gradient(135deg,${C.accentDark}33,${C.surface})`,border:`1px solid ${C.accent}33`,marginBottom:20}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:24,marginBottom:6}}>📅</div>
              <h3 style={{fontSize:18,fontWeight:800,color:C.white,margin:"0 0 4px"}}>次のステップを選んでください</h3>
              <p style={{fontSize:12,color:C.dim,margin:0}}>この診断結果は自動保存されています（ID: {proposalId?.slice(-8)||"—"}）</p>
            </div>

            {/* 3 CTA Options */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12,maxWidth:680,margin:"0 auto 20px"}}>

              {/* 1. Calendly */}
              <button onClick={()=>{
                const name=encodeURIComponent(p?.name||"");
                const company=encodeURIComponent(p?.company||"");
                const notes=encodeURIComponent(`【AI診断結果】\n会社名: ${p?.company}\n王国タイプ: ${p?.kingdom_type}\n月間改善見込: ¥${fmtN(totalGain)}\n診断ID: ${proposalId||"-"}`);
                window.open(`${CALENDLY_URL}?name=${name}&a1=${company}&notes=${notes}`,"_blank");
              }} style={{padding:20,borderRadius:14,background:`linear-gradient(135deg,${C.accentDark}44,${C.surface})`,border:`1px solid ${C.accent}44`,cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
                <div style={{fontSize:28,marginBottom:8}}>📅</div>
                <div style={{fontSize:14,fontWeight:700,color:C.white,marginBottom:4}}>Zoomで無料相談</div>
                <div style={{fontSize:11,color:C.dim}}>Calendlyで日時を選ぶだけ</div>
                <div style={{fontSize:11,color:C.accent,marginTop:6}}>おすすめ ✨</div>
              </button>

              {/* 2. Email */}
              <button onClick={()=>{
                const subject=encodeURIComponent(`【AI診断】${p?.company||""}様 無料相談のご依頼`);
                const body=encodeURIComponent(
`${p?.name||"ご担当者"}様よりAI診断経由でお問い合わせ

━━ 診断サマリー ━━
会社名: ${p?.company||"-"}
業種: ${p?.industry||"-"}
王国タイプ: ${p?.kingdom_type||"-"}
課題: ${p?.challenge||"-"}
月間売上向上見込: ¥${fmtN(revGain)}
月間コスト削減見込: ¥${fmtN(costSave)}
月間改善効果合計: ¥${fmtN(totalGain)}
推奨月額: ¥${fmtN(fee)}
診断ID: ${proposalId||"-"}
━━━━━━━━━━━━

ご希望の日時やご質問があればご記入ください：

`);
                window.open(`mailto:${CONTACT_EMAIL}?subject=${subject}&body=${body}`,"_self");
              }} style={{padding:20,borderRadius:14,background:`linear-gradient(135deg,${C.warm}15,${C.surface})`,border:`1px solid ${C.warm}33`,cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
                <div style={{fontSize:28,marginBottom:8}}>📧</div>
                <div style={{fontSize:14,fontWeight:700,color:C.white,marginBottom:4}}>メールで問い合わせ</div>
                <div style={{fontSize:11,color:C.dim}}>診断結果が自動添付されます</div>
              </button>

              {/* 3. PDF */}
              <button onClick={()=>window.print()} style={{padding:20,borderRadius:14,background:`linear-gradient(135deg,${C.green}15,${C.surface})`,border:`1px solid ${C.green}33`,cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
                <div style={{fontSize:28,marginBottom:8}}>📄</div>
                <div style={{fontSize:14,fontWeight:700,color:C.white,marginBottom:4}}>PDF保存して検討</div>
                <div style={{fontSize:11,color:C.dim}}>社内共有にも使えます</div>
              </button>
            </div>

            <div style={{fontSize:10,color:C.muted,textAlign:"center"}}>※ 診断結果は自動保存されています。お問い合わせの際に診断IDをお伝えいただければスムーズです。</div>
          </div>

          {/* Actions */}
          <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:28}}>
            <button onClick={()=>setView("chat")} style={{padding:"10px 24px",borderRadius:10,background:"transparent",color:C.dim,fontWeight:600,fontSize:13,border:`1px solid ${C.border}`,cursor:"pointer",fontFamily:"inherit"}}>💬 チャットに戻る</button>
            <button onClick={()=>{setProposal(null);setProposalBody("");setStoryText("");setMsgs([]);setGenStep("");setBookingSent(false);setChoices([]);setView("landing");}} style={{padding:"10px 24px",borderRadius:10,background:"transparent",color:C.muted,fontWeight:600,fontSize:13,border:`1px solid ${C.border}`,cursor:"pointer",fontFamily:"inherit"}}>最初から</button>
            <button onClick={()=>setView("admin")} style={{padding:"10px 24px",borderRadius:10,background:"transparent",color:C.muted,fontWeight:600,fontSize:11,border:`1px solid ${C.border}33`,cursor:"pointer",fontFamily:"inherit"}}>🔑 管理</button>
          </div>
          <div style={{textAlign:"center",padding:"14px 0",borderTop:`1px solid ${C.border}`,color:C.muted,fontSize:10}}>AIの町医者 ─ 高橋秀夫 ｜ PAPA 私的AI推進協会</div>
        </div>
        <style>{`@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;background:#fff!important;}#proposal-print{background:#fff!important;}}`}</style>
      </div>
    );
  }

  /* ═══ CHAT ═══ */
  if(view==="chat"){
    return (
      <div style={{height:"100dvh",display:"flex",flexDirection:"column",background:C.bg,fontFamily:"'Noto Sans JP',sans-serif"}}>
        <div style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,background:C.surface,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <AvatarBadge size={32}/>
          <button onClick={()=>setView("landing")} style={{background:"none",border:"none",color:C.muted,fontSize:18,cursor:"pointer",padding:"4px 8px",lineHeight:1}}>✕</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"14px 14px 6px",display:"flex",flexDirection:"column",gap:10}}>
          {msgs.map((m,i)=>(
            m.role==="user"?(
              <div key={i} style={{maxWidth:"82%",padding:"10px 14px",borderRadius:"14px 4px 14px 14px",background:`${C.accent}`,color:"#ffffff",fontSize:13,lineHeight:1.75,alignSelf:"flex-end",wordBreak:"break-word"}}>
                {m.content.split("\n").map((l,j,a)=><span key={j}>{l}{j<a.length-1&&<br/>}</span>)}
              </div>
            ):(
              <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",maxWidth:"88%",alignSelf:"flex-start"}}>
                <img src={AVATAR} alt="" style={{width:28,height:28,borderRadius:"50%",objectFit:"cover",flexShrink:0,marginTop:2,border:`1.5px solid ${C.accent}33`}}/>
                <div style={{padding:"10px 14px",borderRadius:"4px 14px 14px 14px",background:C.card,border:`1px solid ${C.border}`,color:C.text,fontSize:13,lineHeight:1.75,wordBreak:"break-word"}}>
                  {m.content.split("\n").map((l,j,a)=><span key={j}>{l}{j<a.length-1&&<br/>}</span>)}
                </div>
              </div>
            )
          ))}
          {busy&&<div style={{display:"flex",gap:8,alignItems:"flex-start",alignSelf:"flex-start"}}><img src={AVATAR} alt="" style={{width:28,height:28,borderRadius:"50%",objectFit:"cover",flexShrink:0,marginTop:2,border:`1.5px solid ${C.accent}33`}}/><Dots/></div>}
          {error&&!busy&&(
            <div style={{padding:"8px 12px",borderRadius:10,background:`${C.red}15`,border:`1px solid ${C.red}33`,color:C.red,fontSize:12,alignSelf:"flex-start"}}>
              {error} <button onClick={()=>{setError("");}} style={{marginLeft:6,background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:12,textDecoration:"underline"}}>閉じる</button>
            </div>
          )}
          <div ref={endRef}/>
        </div>
        {/* Quick Reply Buttons */}
        {choices.length>0&&!busy&&(
          <div style={{padding:"8px 12px 4px",borderTop:`1px solid ${C.border}`,background:C.surface,display:"flex",gap:6,flexWrap:"wrap",flexShrink:0}}>
            {choices.map((c,i)=>(
              <button key={i} onClick={()=>sendChoice(c)}
                style={{
                  padding:"8px 14px",borderRadius:20,
                  background:"transparent",
                  color:C.accent,fontSize:12,fontWeight:600,
                  border:`1px solid ${C.accentDark}66`,
                  cursor:"pointer",fontFamily:"inherit",
                  transition:"all 0.2s",
                  whiteSpace:"nowrap",
                  maxWidth:"100%",
                  overflow:"hidden",
                  textOverflow:"ellipsis",
                }}
                onMouseEnter={e=>{e.target.style.background=C.accentGlow;e.target.style.borderColor=C.accent;}}
                onMouseLeave={e=>{e.target.style.background="transparent";e.target.style.borderColor=`${C.accentDark}66`;}}
              >{c}</button>
            ))}
          </div>
        )}
        {/* Text Input */}
        <div style={{padding:"8px 12px 10px",borderTop:choices.length>0&&!busy?"none":`1px solid ${C.border}`,background:C.surface,display:"flex",gap:8,flexShrink:0}}>
          <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey}
            onCompositionStart={()=>setComposing(true)} onCompositionEnd={()=>setComposing(false)}
            placeholder={choices.length>0?"上の選択肢をタップ、または自由に入力...":"メッセージを入力..."} disabled={busy}
            style={{flex:1,padding:"10px 12px",borderRadius:10,border:`1px solid ${C.border}`,background:C.bg,color:C.text,fontSize:13,outline:"none",fontFamily:"inherit",opacity:busy?0.5:1}}/>
          <button onClick={()=>send()} disabled={busy||!input.trim()}
            style={{padding:"0 18px",borderRadius:10,background:busy||!input.trim()?C.muted:C.accent,color:"#ffffff",fontWeight:700,fontSize:13,border:"none",cursor:busy?"default":"pointer",fontFamily:"inherit"}}>送信</button>
        </div>
      </div>
    );
  }

  /* ═══ ADMIN VIEW ═══ */
  if(view==="admin"){
    if(!adminLoading && adminData.length===0) loadAdmin();
    const statusColors={new:C.warm,contacted:C.accent,converted:C.green};
    const statusLabels={new:"新規",contacted:"連絡済",converted:"成約"};

    return (
      <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Noto Sans JP',sans-serif"}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"24px 20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <AvatarBadge size={34}/>
              <h1 style={{fontSize:18,fontWeight:800,color:C.white,margin:0}}>管理ダッシュボード</h1>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={loadAdmin} style={{padding:"8px 16px",borderRadius:8,background:C.card,color:C.accent,fontSize:12,fontWeight:600,border:`1px solid ${C.border}`,cursor:"pointer",fontFamily:"inherit"}}>🔄 更新</button>
              <button onClick={()=>setView("landing")} style={{padding:"8px 16px",borderRadius:8,background:C.card,color:C.dim,fontSize:12,fontWeight:600,border:`1px solid ${C.border}`,cursor:"pointer",fontFamily:"inherit"}}>✕ 閉じる</button>
            </div>
          </div>

          {/* Summary */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:24}}>
            {[
              {label:"総診断数",value:adminData.length,color:C.accent},
              {label:"新規",value:adminData.filter(d=>d.status==="new").length,color:C.warm},
              {label:"連絡済",value:adminData.filter(d=>d.status==="contacted").length,color:C.accent},
              {label:"成約",value:adminData.filter(d=>d.status==="converted").length,color:C.green},
            ].map((s,i)=>(
              <div key={i} style={{padding:16,borderRadius:12,background:C.card,border:`1px solid ${C.border}`,textAlign:"center"}}>
                <div style={{fontSize:28,fontWeight:800,color:s.color}}>{s.value}</div>
                <div style={{fontSize:11,color:C.muted}}>{s.label}</div>
              </div>
            ))}
          </div>

          {adminLoading&&<div style={{textAlign:"center",padding:40,color:C.dim}}>読み込み中...</div>}

          {/* List */}
          {adminData.map((d,i)=>{
            const k=KINGDOM[d.kingdom_type]||{emoji:"🏰",color:C.accent};
            return (
              <div key={i} style={{padding:16,borderRadius:14,background:C.card,border:`1px solid ${C.border}`,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
                  <div style={{flex:1,minWidth:200}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <span style={{fontSize:18}}>{k.emoji}</span>
                      <span style={{fontSize:15,fontWeight:700,color:C.white}}>{d.company}</span>
                      <span style={{padding:"2px 8px",borderRadius:4,background:`${statusColors[d.status]||C.muted}22`,color:statusColors[d.status]||C.muted,fontSize:10,fontWeight:600}}>
                        {statusLabels[d.status]||d.status}
                      </span>
                    </div>
                    <div style={{fontSize:12,color:C.dim,marginBottom:4}}>
                      {d.name}様 ｜ {d.industry} ｜ {k.label}
                    </div>
                    <div style={{fontSize:12,color:C.muted,marginBottom:6}}>
                      {d.challenge?.substring(0,80)}{d.challenge?.length>80?"...":""}
                    </div>
                    <div style={{display:"flex",gap:12,flexWrap:"wrap",fontSize:11}}>
                      <span style={{color:C.green}}>売上+{fmt(d.revenue_gain)}/月</span>
                      <span style={{color:C.accent}}>削減{fmt(d.cost_saving)}/月</span>
                      <span style={{color:C.warm}}>合計{fmt(d.total_gain)}/月</span>
                      <span style={{color:C.white}}>推奨{fmt(d.monthly_fee)}/月</span>
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:10,color:C.muted,marginBottom:6}}>

            );
          })}
